<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title | default: site.github.repository_name }}</title>
    <style>
      body {
        background-color: #fbfaf7 !important; /* Anthropic warm off-white */
        color: #191919 !important;           /* Deep charcoal text */
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        max-width: 800px;
        margin: 40px auto;
        padding: 0 20px;
        line-height: 1.6;
      }
      a {
        color: #191919;
        text-decoration: underline;
      }
      a:hover {
        color: #e05e3e;
      }
      h1, h2, h3 {
        color: #191919;
        font-weight: 500;
      }
      code {
        background: #f1efe9;
        padding: 2px 6px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>{{ site.title | default: site.github.repository_name }}</h1>
    </header>
    <main>
      {{ content }}
    </main>
  </body>
</html>
